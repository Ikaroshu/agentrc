providers:
  pareto-easy:
    baseUrl: https://openrouter.ai/api/v1
    apiKey: OPENROUTER_API_KEY
    api: openai-completions
    authHeader: true
    models:
      - id: openrouter/pareto-code
        name: Pareto Code Easy
        reasoning: true
        input: [text]
        contextWindow: 1000000
        maxTokens: 65536
        compat:
          thinkingFormat: openrouter
          extraBody:
            plugins:
              - id: pareto-router
                min_coding_score: 0.0
  pareto-medium:
    baseUrl: https://openrouter.ai/api/v1
